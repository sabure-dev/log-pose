name: Log Pose CI

on:
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install Ruff
        run: pip install ruff
        
      - name: Run Ruff Linter
        run: ruff check .
        
      - name: Run Ruff Formatter
        run: ruff format --check .
