services:
  postgres:
    image: postgres:18-alpine
    container_name: logpose_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ORDERS_DB_PASSWORD: ${ORDERS_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./infra/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - logpose_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: order_service/
    container_name: orders_api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - order_service/.env
    restart: on-failure
    networks:
      - logpose_net

networks:
  logpose_net:
    driver: bridge

volumes:
  postgres_data: